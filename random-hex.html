<!DOCTYPE html>

<head>
    <title>Random Hex Color by Auro</title>
    <style>
        :root {
            --random-color: #999999;
        }

        body {
            background-color: var(--random-color);
        }

        html,
        body,
        .container {
            height: 100%;
        }

        html,
        body {
            margin: 0;
            height: 100%;
            overflow: hidden;
        }

        .container {
            display: -webkit-flexbox;
            display: -ms-flexbox;
            display: -webkit-flex;
            display: flex;
            -webkit-flex-align: center;
            -ms-flex-align: center;
            -webkit-align-items: center;
            align-items: center;
            justify-content: center;
        }

        p {
            font-size: 75px;
            font-family: Arial, Helvetica, sans-serif;
            color: #242424
        }
    </style>
</head>

<body>
    <div class="container">
        <p id="pogpog">There was an error</p>
    </div>

    <script>
        const COLORPOGGERS = getRandomColor()
        // https://www.tutorialspoint.com/generating-random-hex-color-in-javascript
        function getRandomColor() {
            let color = '#';
            for (let i = 0; i < 6; i++) {
                const random = Math.random();
                const bit = (random * 16) | 0;
                color += (bit).toString(16);
            };
            return color;
        }

        var c = COLORPOGGERS.substring(1); // strip #
        var rgb = parseInt(c, 16); // convert rrggbb to decimal
        var r = (rgb >> 16) & 0xff; // extract red
        var g = (rgb >> 8) & 0xff; // extract green
        var b = (rgb >> 0) & 0xff; // extract blue

        var luma = 0.2126 * r + 0.7152 * g + 0.0722 * b; // per ITU-R BT.709

        if (luma < 40) {
            document.getElementById("pogpog").style.color = "#828282";
        }

        document.documentElement.style.setProperty("--random-color", COLORPOGGERS)
        document.getElementById("pogpog").innerHTML = COLORPOGGERS.toUpperCase()
    </script>
</body>
